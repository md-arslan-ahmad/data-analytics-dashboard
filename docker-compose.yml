version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount processed CSVs so you can re-run analysis without rebuilding
      - ./data/processed:/app/data/processed
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Optional: serve the frontend via nginx
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
